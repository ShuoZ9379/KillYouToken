<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KillYouToken</title>

  <!-- 更细、更有压迫感的字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Oswald", Arial, sans-serif;
    }

    body {
      position: relative;
      color: #fff;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 82%, rgba(255, 0, 40, 0.22), transparent 24%),
        radial-gradient(circle at 50% 95%, rgba(255, 0, 40, 0.18), transparent 38%),
        linear-gradient(to bottom, #000 0%, #000 62%, #050000 78%, #130000 100%);
    }

    canvas#rain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.12;
    }

    .reflection {
      position: absolute;
      left: 50%;
      bottom: 3vh;
      transform: translateX(-50%);
      width: min(1200px, 94vw);
      height: 180px;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(255, 0, 0, 0.42) 0%, rgba(255, 0, 0, 0.22) 28%, rgba(255, 0, 0, 0.10) 48%, rgba(255, 0, 0, 0.03) 66%, transparent 78%);
      filter: blur(20px);
      opacity: 1;
    }

    .reflection::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 18px;
      height: 48px;
      background: linear-gradient(to right,
        transparent,
        rgba(255, 30, 30, 0.22),
        rgba(255, 70, 70, 0.36),
        rgba(255, 30, 30, 0.22),
        transparent
      );
      filter: blur(10px);
    }

    .wrap {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .content {
      width: 100%;
      max-width: 1400px;
      text-align: center;
      animation: fadeUp 1.1s ease-out forwards;
    }

    h1 {
      font-size: clamp(62px, 10vw, 160px);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.035em;
      margin-bottom: 26px;
      position: relative;
      display: inline-block;
      color: #070707;
      -webkit-text-stroke: 2px rgba(255, 40, 40, 0.95);
      text-shadow:
        2px 2px 0 rgba(255, 0, 0, 0.22),
        4px 4px 0 rgba(120, 0, 0, 0.18),
        0 0 6px rgba(255, 0, 0, 0.95),
        0 0 16px rgba(255, 0, 0, 0.88),
        0 0 34px rgba(255, 0, 0, 0.72),
        0 0 72px rgba(255, 0, 0, 0.46);
      animation: titleGlow 2.3s ease-in-out infinite alternate;
    }

    .tagline {
      font-size: clamp(18px, 1.7vw, 30px);
      line-height: 1.45;
      font-weight: 300;
      letter-spacing: 0.07em;
      color: rgba(255, 240, 240, 0.95);
      text-transform: uppercase;
      margin: 14px 0;
      text-shadow:
        0 0 6px rgba(255,255,255,0.10),
        0 0 14px rgba(255,40,40,0.08);
      opacity: 0;
      transform: translateY(18px);
      animation: lineIn 0.8s ease forwards;
    }

    .tagline:nth-of-type(1) { animation-delay: 0.35s; }
    .tagline:nth-of-type(2) { animation-delay: 0.7s; }
    .tagline:nth-of-type(3) { animation-delay: 1.05s; }
    .tagline:nth-of-type(4) { animation-delay: 1.4s; }

    .danger {
      color: #ff3838;
      font-weight: 400;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.95),
        0 0 18px rgba(255, 0, 0, 0.62),
        0 0 36px rgba(255, 0, 0, 0.32);
    }

    .small {
      font-size: clamp(15px, 1.35vw, 24px);
      margin-top: 20px;
      letter-spacing: 0.08em;
    }

    @keyframes titleGlow {
      from {
        text-shadow:
          2px 2px 0 rgba(255, 0, 0, 0.22),
          4px 4px 0 rgba(120, 0, 0, 0.18),
          0 0 6px rgba(255, 0, 0, 0.95),
          0 0 16px rgba(255, 0, 0, 0.88),
          0 0 34px rgba(255, 0, 0, 0.72),
          0 0 72px rgba(255, 0, 0, 0.46);
      }
      to {
        text-shadow:
          2px 2px 0 rgba(255, 20, 20, 0.28),
          5px 5px 0 rgba(120, 0, 0, 0.22),
          0 0 10px rgba(255, 40, 40, 1),
          0 0 24px rgba(255, 20, 20, 0.98),
          0 0 48px rgba(255, 0, 0, 0.84),
          0 0 96px rgba(255, 0, 0, 0.56);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 24px 14px;
      }

      .tagline {
        letter-spacing: 0.05em;
        margin: 12px 0;
      }

      .reflection {
        height: 120px;
        bottom: 5vh;
      }

      h1 {
        -webkit-text-stroke: 1.5px rgba(255, 40, 40, 0.95);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <canvas id="rain"></canvas>
  <div class="scanline"></div>
  <div class="reflection"></div>

  <div class="wrap">
    <div class="content">
      <h1 class="drip-title">
	KillYouToken
	<span class="drip"></span>
      </h1>

      <style>
	.drip-title {
	    position: relative;
	    display: inline-block;
	    font-size: clamp(62px, 10vw, 160px);
	    font-weight: 700;
	    color: #070707;
	    -webkit-text-stroke: 2px rgba(255, 40, 40, 0.95);
	    text-shadow:
		2px 2px 0 rgba(255, 0, 0, 0.22),
		4px 4px 0 rgba(120, 0, 0, 0.18),
		0 0 6px rgba(255, 0, 0, 0.95),
		0 0 16px rgba(255, 0, 0, 0.88),
		0 0 34px rgba(255, 0, 0, 0.72),
		0 0 72px rgba(255, 0, 0, 0.46);
	}
	
	/* 滴落主体 */
	.drip-title .drip::before,
	.drip-title .drip::after {
	    content: "";
	    position: absolute;
	    bottom: -8px;
	    width: 6px;
	    height: 18px;
	    background: linear-gradient(to bottom, #ff2b2b, rgba(255,0,0,0.2));
	    border-radius: 50%;
	    box-shadow: 0 0 10px rgba(255,0,0,0.8);
	    animation: dripFall 1.8s infinite ease-in;
	}

	/* 不同位置的滴 */
	.drip-title .drip::before {
	    left: 25%;
	    animation-delay: 0.3s;
	}
	
	.drip-title .drip::after {
	    left: 65%;
	    animation-delay: 1s;
	}
	
	/* 下落动画 */
	@keyframes dripFall {
	    0% {
		transform: translateY(0) scaleY(1);
		opacity: 1;
	    }
	    70% {
		transform: translateY(12px) scaleY(1.2);
		opacity: 0.8;
	    }
	    100% {
		transform: translateY(20px) scaleY(0.6);
		opacity: 0;
	    }
	}
      </style>

      <p class="tagline">THE MOST <span class="danger">DANGEROUS</span> MEME TOKEN.</p>
      <p class="tagline">NOT A PROMISE. NOT A UTILITY. JUST PURE <span class="danger">CHAOS.</span></p>
      <p class="tagline">BUY AT YOUR OWN <span class="danger">RISK.</span> WE WARNED YOU.</p>
      <p class="tagline small">THIS IS NOT FINANCIAL ADVICE.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");

    let width, height, drops = [];

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initRain();
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function initRain() {
      drops = [];
      const count = Math.floor((width * height) / 11000); // 更密
      for (let i = 0; i < count; i++) {
        drops.push({
          x: rand(0, width),
          y: rand(0, height),
          len: rand(26, 58),
          speed: rand(10, 24),
          thick: rand(0.9, 2.0),
          alpha: rand(0.30, 0.75), // 更亮
          redBoost: rand(0.18, 0.42)
        });
      }
    }

    function resetDrop(drop) {
      drop.x = rand(0, width);
      drop.y = rand(-120, -20);
      drop.len = rand(26, 58);
      drop.speed = rand(10, 24);
      drop.thick = rand(0.9, 2.0);
      drop.alpha = rand(0.30, 0.75);
      drop.redBoost = rand(0.18, 0.42);
    }

    function drawRain() {
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < drops.length; i++) {
        const d = drops[i];

        const grad = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.len);
        grad.addColorStop(0, `rgba(255, 70, 70, 0)`);
        grad.addColorStop(0.25, `rgba(255, 120, 120, ${d.alpha * 0.45})`);
        grad.addColorStop(0.7, `rgba(255, 70, 70, ${d.alpha * 0.9})`);
        grad.addColorStop(1, `rgba(255, 20, 20, ${d.alpha})`);

        ctx.beginPath();
        ctx.strokeStyle = grad;
        ctx.lineWidth = d.thick;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(255, 0, 0, ${Math.min(d.alpha, 0.75)})`;
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.len);
        ctx.stroke();

        if (d.y > height * 0.74) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255, 30, 30, ${d.alpha * 0.38})`;
          ctx.lineWidth = d.thick * 1.35;
          ctx.shadowBlur = 12;
          ctx.shadowColor = `rgba(255, 0, 0, ${d.alpha * 0.7})`;
          ctx.moveTo(d.x, d.y + d.len);
          ctx.lineTo(d.x, d.y + d.len + 8);
          ctx.stroke();
        }

        d.y += d.speed;
        d.x += 0.22;

        if (d.y > height + d.len + 10) {
          resetDrop(d);
        }
      }

      ctx.shadowBlur = 0;
      requestAnimationFrame(drawRain);
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    drawRain();
  </script>
</body>
</html>
