<!DOCTYPE html>
<html>
<head>
  <title>KillYouToken</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 15%;
      margin: 0;
    }

    h1 {
      font-size: 80px;
      margin-bottom: 40px;
      color: #ff0033;
      text-shadow: 
        0 0 10px #ff0033,
        0 0 20px #ff0033,
        0 0 40px #ff0033;
      animation: glow 2s ease-in-out infinite alternate;
    }

    p {
      font-size: 26px;
      margin: 10px 0;
      opacity: 0;
      animation: fadeIn 1s forwards;
    }

    /* 每行延迟出现 */
    p:nth-child(2) { animation-delay: 0.5s; }
    p:nth-child(3) { animation-delay: 1s; }
    p:nth-child(4) { animation-delay: 1.5s; }
    p:nth-child(5) { animation-delay: 2s; }

    /* 发光动画 */
    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #ff0033,
          0 0 20px #ff0033,
          0 0 40px #ff0033;
      }
      to {
        text-shadow:
          0 0 20px #ff0033,
          0 0 40px #ff0033,
          0 0 80px #ff0033;
      }
    }

    /* 淡入动画 */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
      from {
        opacity: 0;
        transform: translateY(20px);
      }
    }
  </style>
</head>

<body>
  <h1>KillYouToken</h1>
  <p>The most dangerous meme token.</p>
  <p>Not a promise. Not a utility. Just pure chaos.</p>
  <p>Buy at your own risk. We warned you.</p>
  <p>This is not financial advice.</p>
</body>
</html>
